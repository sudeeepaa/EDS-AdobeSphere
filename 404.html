<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — AdobeSphere</title>
  <script type="text/javascript">
    window.isErrorPage = true;
  </script>
  <script src="/scripts/aem.js" type="module"></script>
  <script src="/scripts/scripts.js" type="module"></script>
  <link rel="stylesheet" href="/styles/styles.css"/>
  <style>
    .err-page {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 24px;
      text-align: center;
    }

    .err-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 14vw, 12rem);
      color: var(--red-primary);
      line-height: 1;
      margin: 0;
    }

    .err-title {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
    }

    .err-body {
      max-width: 480px;
      color: var(--text-secondary);
      margin: 0 0 12px;
    }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div class="section">
      <div class="err-page">
        <p class="err-code">404</p>
        <h1 class="err-title">Page not found</h1>
        <p class="err-body">The page you're looking for doesn't exist or has been moved. Try heading back to the home page or exploring the catalogue.</p>
        <p>
          <strong><a href="/">Back to home</a></strong>
          <em><a href="/explore">Explore content</a></em>
        </p>
      </div>
    </div>
  </main>
  <footer></footer>
</body>
</html>
