<!DOCTYPE html>
<html lang="en">
<head>
  <title>Contact — AdobeSphere</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/icons/card-fallback.svg">
  <script src="/scripts/aem.js" type="module"></script>
  <script src="/scripts/scripts.js" type="module"></script>
  <link rel="stylesheet" href="/styles/styles.css"/>
</head>
<body>
  <header></header>
  <main>

    <!-- HERO (default) -->
    <div>
      <div class="hero">
        <div>
          <h1>Get in Touch</h1>
          <p>Questions, feedback, or collaboration ideas? We would love to hear from you.</p>
          <p class="text-muted">We typically respond within 24–48 hours. No account required.</p>
        </div>
      </div>
    </div>

    <!-- CONTACT FORM (default form variant) -->
    <div>
      <div class="form">
        <div><div>Title</div><div>Send us a message</div></div>
        <div><div>Submit</div><div>Send Message</div></div>
        <div><div>Success</div><div>Thanks — we'll get back to you within 24–48 hours.</div></div>
      </div>
    </div>

  </main>
  <footer></footer>
</body>
</html>
