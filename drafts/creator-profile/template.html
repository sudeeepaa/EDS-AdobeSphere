<!DOCTYPE html>
<html lang="en">
<head>
  <title>Creator — AdobeSphere</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/icons/card-fallback.svg">
  <script src="/scripts/aem.js" type="module"></script>
  <script src="/scripts/scripts.js" type="module"></script>
  <link rel="stylesheet" href="/styles/styles.css"/>
</head>
<body>
  <header></header>
  <main>

    <!-- HERO (gradient) + creator profile card -->
    <div class="section-metadata"><div><div>style</div><div>flush</div></div></div>
    <div>
      <div class="profile creator"><div></div></div>
    </div>

    <!-- About / full bio -->
    <div>
      <div class="detail-section bio creator">
        <div><div>Title</div><div>About</div></div>
        <div><div>Id Source</div><div>creators</div></div>
      </div>
    </div>

    <!-- Reach out -->
    <div class="section-metadata"><div><div>style</div><div>light</div></div></div>
    <div>
      <div class="detail-section reach-out">
        <div><div>Title</div><div>Reach Out</div></div>
        <div><div>Id Source</div><div>creators</div></div>
      </div>
    </div>

    <!-- Events &amp; Campaigns by this creator -->
    <div>
      <div class="cards events">
        <div><div>Title</div><div>Events &amp; Campaigns</div></div>
        <div><div>Source</div><div>events</div></div>
      </div>
    </div>

    <!-- Published Blogs by this creator -->
    <div>
      <div class="cards blogs">
        <div><div>Title</div><div>Published Blogs</div></div>
        <div><div>Source</div><div>blogs</div></div>
      </div>
    </div>

    <!-- Featured quote -->
    <div>
      <div class="detail-section quote">
        <div><div>Id Source</div><div>creators</div></div>
      </div>
    </div>

  </main>
  <footer></footer>
</body>
</html>
